<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!--
      GTM + tag di dalamnya (GA, Meta, TikTok, dll.) membebani main thread dan byte tidak terpakai di PSI.
      dataLayer tetap hidup; gtm.js dimuat setelah engagement pertama atau fallback setelah load (bot / bounce).
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      var __gtmBooted = false;
      function loadGtm() {
        if (__gtmBooted) return;
        __gtmBooted = true;
        (function (w, d, s, l, i) {
          w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != "dataLayer" ? "&l=" + l : "";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, "script", "dataLayer", "GTM-N7LD8CX");
      }
      ["scroll", "pointerdown", "keydown", "touchstart"].forEach(function (ev) {
        window.addEventListener(ev, loadGtm, { once: true, passive: true });
      });
      window.addEventListener(
        "load",
        function () {
          setTimeout(loadGtm, 10000);
        },
        { once: true },
      );
    </script>
    <!-- End Google Tag Manager -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Vialdi Wedding — wedding organizer, dokumentasi foto & video, rias pengantin, sewa gaun & jas, serta dekorasi pernikahan."
    />
    <!-- Meta Pixel Code -->
    <script>
      /**
       * Performance: Meta Pixel is a top 3rd-party cost in Lighthouse mobile.
       * Load it only after first user interaction (or after a long fallback delay).
       */
      window.__fbPixelBooted = false;
      function loadMetaPixel() {
        if (window.__fbPixelBooted) return;
        window.__fbPixelBooted = true;
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
        fbq("init", "490486342185584");
        fbq("track", "PageView");
      }

      ["scroll", "pointerdown", "keydown", "touchstart"].forEach(function (ev) {
        window.addEventListener(ev, loadMetaPixel, { once: true, passive: true });
      });
      window.addEventListener(
        "load",
        function () {
          setTimeout(loadMetaPixel, 15000);
        },
        { once: true },
      );
    </script>
    <!-- End Meta Pixel Code -->
    <meta property="og:title" content="Vialdi Wedding — Wedding Organizer &amp; Dokumentasi" />
    <meta
      property="og:description"
      content="Wujudkan pernikahan impian: dekorasi, busana, rias, dan tim foto-video profesional."
    />
    <meta property="og:type" content="website" />
    <!-- Playfair Display 600/700: self-host via `@fontsource/playfair-display` (main.tsx) — bukan Google Fonts CDN. -->
    <title>Vialdi Wedding — Wedding Organizer</title>
    <!-- Entry module (defer bawaan); penemuan lebih awal daripada skrip di akhir body. -->
    <script type="module" src="/src/main.tsx"></script>
  </head>
