    <!--
      FCP: latar + bar statis (selaras Header) agar paint pertama terjadi sebelum bundle React/CSS penuh.
      Teks merek di #vialdi-fcp-title diganti saat build (vite) menurut VITE_WEB_ID.
    -->
    <style id="vialdi-fcp-critical">
      html {
        background-color: oklch(0.985 0.005 90);
      }
      body {
        margin: 0;
        min-height: 100%;
        background-color: oklch(0.985 0.005 90);
        color: oklch(0.22 0.03 250);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      #vialdi-fcp-root {
        min-height: 100vh;
        box-sizing: border-box;
      }
      #vialdi-fcp-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
        border-bottom: 1px solid oklch(0.9 0.01 80 / 0.65);
        padding: 0 16px;
        max-width: 90rem;
        margin: 0 auto;
        background-color: oklch(0.985 0.005 90 / 0.92);
        backdrop-filter: blur(10px);
      }
      @media (min-width: 768px) {
        #vialdi-fcp-bar {
          height: 64px;
          padding: 0 24px;
        }
      }
      #vialdi-fcp-title {
        font-size: 1.125rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      @media (min-width: 768px) {
        #vialdi-fcp-title {
          font-size: 1.5rem;
        }
      }
    </style>
    <!-- Playfair Display 600/700: self-host via `@fontsource/playfair-display` (main.tsx) — bukan Google Fonts CDN. -->
    <title>Vialdi Wedding — Wedding Organizer</title>
  </head>
