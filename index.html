<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!--
      GTM + tag di dalamnya (GA, Meta, TikTok, dll.) membebani main thread dan byte tidak terpakai di PSI.
      dataLayer tetap hidup; gtm.js dimuat setelah engagement pertama atau fallback setelah load (bot / bounce).
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      var __gtmBooted = false;
      function loadGtm() {
        if (__gtmBooted) return;
        __gtmBooted = true;
        (function (w, d, s, l, i) {
          w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != "dataLayer" ? "&l=" + l : "";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, "script", "dataLayer", "GTM-N7LD8CX");
      }
      ["scroll", "pointerdown", "keydown", "touchstart"].forEach(function (ev) {
        window.addEventListener(ev, loadGtm, { once: true, passive: true });
      });
      window.addEventListener(
        "load",
        function () {
          setTimeout(loadGtm, 10000);
        },
        { once: true },
      );
    </script>
    <!-- End Google Tag Manager -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta
      name="description"
      content="Vialdi Wedding — wedding organizer, dokumentasi foto & video, rias pengantin, sewa gaun & jas, serta dekorasi pernikahan."
    />
    <meta property="og:title" content="Vialdi Wedding — Wedding Organizer &amp; Dokumentasi" />
    <meta
      property="og:description"
      content="Wujudkan pernikahan impian: dekorasi, busana, rias, dan tim foto-video profesional."
    />
    <meta property="og:type" content="website" />
    <!--
      `dns-prefetch` saja: stylesheet font memakai media=print + onload, jadi koneksi TLS ke Google Fonts
      sering dianggap "unused preconnect" di PSI untuk rute non-hero. Prefetch DNS tetap membantu saat CSS dimuat.
    -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!-- Non-render-blocking: stylesheet font tidak menahan FCP (onload swap media). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Vialdi Wedding — Wedding Organizer</title>
    <!-- Entry module (defer bawaan); penemuan lebih awal daripada skrip di akhir body. -->
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-N7LD8CX"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
        title="Google Tag Manager"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <main id="main-content">
      <div id="root"></div>
    </main>
  </body>
</html>
